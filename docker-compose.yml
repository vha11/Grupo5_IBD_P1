services:

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: grupo5
      RABBITMQ_DEFAULT_PASS: cbadenes
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bigdata_net

  task-producer:
    build: ./producer
    container_name: task-producer
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: grupo5
      RABBITMQ_PASS: cbadenes
      TASK_RATE: 1
    networks:
      - bigdata_net

  text-agent:
    build: ./text_agent
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: grupo5
      RABBITMQ_PASS: cbadenes
      HTTP_PORT: 8001
    ports:
      - "8001:8001"
    volumes:
      - text_results:/data
    networks:
      - bigdata_net

  image-agent:
    build: ./image_agent
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: grupo5
      RABBITMQ_PASS: cbadenes
      HTTP_PORT: 8002
    ports:
      - "8002:8002"
    volumes:
      - image_results:/data
    networks:
      - bigdata_net

  task-logger:
    build: ./task_logger
    container_name: task-logger
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: grupo5
      RABBITMQ_PASS: cbadenes
    ports:
      - "8000:8000"
    volumes:
      - global_logs:/data
    networks:
      - bigdata_net

volumes:
  text_results:
  image_results:
  global_logs:

networks:
  bigdata_net:
    driver: bridge