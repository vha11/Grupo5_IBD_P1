version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management

    ports:
     - "5672:5672"
     - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    
  producer:

    build:
      context: ./producer
    container_name: producer
    volumes:
      - ./producer:/app
    
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE=text_analysis_queue
    depends_on:
      - rabbitmq


  text_analysis:

    build:
      context: ./text-analysis
    container_name: text_analysis
    volumes:
      - ./text-analysis:/app
    
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE=text_analysis_queue
    depends_on:
      - rabbitmq


  image-class:

    build:
      context: ./image-class
    container_name: image_class
    volumes:
      - ./image-class:/app
    
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
      - RABBITMQ_QUEUE=image_class_queue
    depends_on:
      - rabbitmq


